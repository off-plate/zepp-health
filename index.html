<style>

    --bg: #0e0e10;
    --panel: #16161a;
    --panel-2: #1d1d22;
    --border: #232328;
    --border-2: #2e2e35;
    --fg: #f3f3f0;
    --muted: #8a8a85;
    --muted-2: #6a6a65;
    --accent: #e26d5c;          /* warm coral / pulse */
    --accent-ink: #1a0e0c;
    --accent-soft: rgba(226, 109, 92, 0.12);
    --green: #6ec27a;
    --blue: #7aa8d8;
    --yellow: #e7c66b;
    --purple: #c08dd6;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;

  a { color: var(--accent); text-decoration: none; }

  .wrap { max-width: 1200px; margin: 0 auto; padding: 32px 28px 80px; }
  @media (max-width: 640px) { .wrap { padding: 20px 16px 60px; } }

  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-mark {
    width: 40px; height: 40px; border-radius: 10px;
    background: var(--accent); color: var(--accent-ink);
    display: grid; place-items: center; font-weight: 800;

  .range-tabs { display: inline-flex; gap: 4px; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 4px; }

    padding: 6px 12px; border-radius: 7px; color: var(--muted); font-weight: 500; font-size: 13px; cursor: pointer;
  }
  .range-tabs button.active { background: var(--panel-2); color: var(--fg); }

  /* Stats grid */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;

  .stat .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
  .stat .value { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; margin-top: 6px; line-height: 1.1; }

    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;

  .card-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; gap: 10px; }

  .empty { text-align: center; padding: 48px 20px; color: var(--muted); }

  .text-sm { font-size: 13px; }
  .row-h { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

<script>
  // Surface any fatal runtime error to the page so we don't get stuck on Loading…
  function showFatal(msg) {
    const root = document.getElementById('root');
    if (root) root.innerHTML = '<div style="padding:24px;font-family:monospace;color:#e26d5c;max-width:760px;margin:40px auto;white-space:pre-wrap;font-size:13px"><b>Error</b>\n\n' + String(msg) + '</div>';
  }
  window.addEventListener('error', (e) => {
    showFatal((e.message || e.error) + '\nat ' + (e.filename || '') + ':' + (e.lineno || '?'));
  });
  window.addEventListener('unhandledrejection', (e) => {
    showFatal('Promise rejection: ' + (e.reason && (e.reason.message || e.reason.stack) || e.reason));
  });
</script>

<script type="text/babel" data-presets="react">
// ===== src/charts.jsx =====
// Hand-rolled SVG chart helpers. Dark theme, mobile-friendly.

const COLORS = {
  accent: '#e26d5c', green: '#6ec27a', blue: '#7aa8d8', yellow: '#e7c66b',
  purple: '#c08dd6', muted: '#8a8a85', grid: '#232328'
};

function fmtDay(d) {
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
}

// Generic bar chart. data: [{ day, value }]
function BarChart({ data, color = COLORS.accent, unit = '', height = 160, formatValue = v => v }) {
  if (!data || data.length === 0) return <Empty />;
  const W = 600, H = height, P = { top: 16, right: 8, bottom: 24, left: 36 };
  const innerW = W - P.left - P.right;
  const innerH = H - P.top - P.bottom;
  const values = data.map(d => d.value || 0);
  const max = Math.max(...values, 1);
  const barW = innerW / data.length * 0.72;
  const step = innerW / data.length;

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width: '100%', height: 'auto', display: 'block'}}>
      {[0.25, 0.5, 0.75, 1].map(p => (
        <line key={p} x1={P.left} x2={W - P.right} y1={P.top + innerH * (1 - p)} y2={P.top + innerH * (1 - p)} stroke={COLORS.grid} strokeWidth={1} />
      ))}
      {[0.5, 1].map(p => (
        <text key={p} x={P.left - 6} y={P.top + innerH * (1 - p) + 4} textAnchor="end" fill={COLORS.muted} fontSize="10" fontFamily="JetBrains Mono">
          {formatValue(max * p)}
        </text>
      ))}
      {data.map((d, i) => {
        const v = d.value || 0;
        const h = (v / max) * innerH;
        const x = P.left + i * step + (step - barW) / 2;
        const y = P.top + innerH - h;
        return <rect key={i} x={x} y={y} width={barW} height={h} fill={color} opacity={v ? 0.85 : 0.15} rx={2} />;
      })}
      {/* X labels: first, mid, last */}
      {[0, Math.floor(data.length / 2), data.length - 1].map(i => (
        <text key={i} x={P.left + i * step + step / 2} y={H - 6} textAnchor="middle" fill={COLORS.muted} fontSize="10" fontFamily="JetBrains Mono">
          {fmtDay(data[i].day)}
        </text>
      ))}
    </svg>
  );
}

// Line chart with optional rolling-average overlay. data: [{ day, value }]
function LineChart({ data, color = COLORS.accent, height = 160, overlay = true, formatValue = v => v }) {
  if (!data || data.length === 0) return <Empty />;
  const W = 600, H = height, P = { top: 16, right: 8, bottom: 24, left: 36 };
  const innerW = W - P.left - P.right;
  const innerH = H - P.top - P.bottom;
  const valid = data.filter(d => d.value != null);
  if (valid.length === 0) return <Empty />;
  const values = valid.map(d => d.value);
  const min = Math.min(...values);
  const max = Math.max(...values);
  const range = Math.max(max - min, 1);
  const pad = range * 0.1;
  const lo = min - pad, hi = max + pad;

  const xAt = i => P.left + (data.length === 1 ? innerW / 2 : (i / (data.length - 1)) * innerW);
  const yAt = v => P.top + innerH * (1 - (v - lo) / (hi - lo));

  // Rolling 7-day average
  const rolled = data.map((d, i) => {
    if (!overlay) return null;
    const window = data.slice(Math.max(0, i - 6), i + 1).filter(x => x.value != null);
    if (window.length === 0) return null;
    return window.reduce((s, x) => s + x.value, 0) / window.length;
  });

  // Build line path skipping nulls
  let path = '';
  data.forEach((d, i) => {
    if (d.value == null) { path += ' M'; return; }
    const cmd = (i === 0 || path.endsWith(' M')) ? 'M' : 'L';
    path += (path.endsWith(' M') ? '' : ' ') + cmd + xAt(i) + ',' + yAt(d.value);
  });
  path = path.replace(/ M$/, '').replace(/ M /g, ' ');

  let rolledPath = '';
  if (overlay) {
    rolled.forEach((v, i) => {
      if (v == null) return;
      rolledPath += (rolledPath ? ' L' : 'M') + xAt(i) + ',' + yAt(v);
    });
  }

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width: '100%', height: 'auto', display: 'block'}}>
      {[0.25, 0.5, 0.75, 1].map(p => (
        <line key={p} x1={P.left} x2={W - P.right} y1={P.top + innerH * (1 - p)} y2={P.top + innerH * (1 - p)} stroke={COLORS.grid} strokeWidth={1} />
      ))}
      <text x={P.left - 6} y={P.top + 4} textAnchor="end" fill={COLORS.muted} fontSize="10" fontFamily="JetBrains Mono">{formatValue(hi)}</text>
      <text x={P.left - 6} y={P.top + innerH + 4} textAnchor="end" fill={COLORS.muted} fontSize="10" fontFamily="JetBrains Mono">{formatValue(lo)}</text>

      {overlay && rolledPath && <path d={rolledPath} fill="none" stroke={color} strokeWidth={3} opacity={0.6} />}
      <path d={path} fill="none" stroke={color} strokeWidth={1.5} opacity={overlay ? 0.45 : 1} />

      {data.map((d, i) => d.value != null ? (
        <circle key={i} cx={xAt(i)} cy={yAt(d.value)} r={2.2} fill={color} />
      ) : null)}

      {[0, Math.floor(data.length / 2), data.length - 1].map(i => (
        <text key={i} x={xAt(i)} y={H - 6} textAnchor={i === 0 ? 'start' : i === data.length - 1 ? 'end' : 'middle'} fill={COLORS.muted} fontSize="10" fontFamily="JetBrains Mono">
          {fmtDay(data[i].day)}
        </text>
      ))}
    </svg>
  );
}

// Training load: CTL (fitness), ATL (fatigue), Form (CTL-ATL)
function TrainingLoadChart({ data, height = 200 }) {
  if (!data || data.length === 0) return <Empty />;
  const W = 600, H = height, P = { top: 16, right: 8, bottom: 24, left: 36 };
  const innerW = W - P.left - P.right;
  const innerH = H - P.top - P.bottom;
  const all = data.flatMap(d => [d.ctl, d.atl]).filter(v => v != null);
  if (all.length === 0) return <Empty />;
  const min = Math.min(...all, 0);
  const max = Math.max(...all, 1);
  const range = Math.max(max - min, 1);

  const xAt = i => P.left + (data.length === 1 ? innerW / 2 : (i / (data.length - 1)) * innerW);
  const yAt = v => P.top + innerH * (1 - (v - min) / range);

  function pathFor(field) {
    let p = '';
    data.forEach((d, i) => {
      if (d[field] == null) return;
      p += (p ? ' L' : 'M') + xAt(i) + ',' + yAt(d[field]);
    });
    return p;
  }

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width: '100%', height: 'auto', display: 'block'}}>
      {[0.25, 0.5, 0.75, 1].map(p => (
        <line key={p} x1={P.left} x2={W - P.right} y1={P.top + innerH * (1 - p)} y2={P.top + innerH * (1 - p)} stroke={COLORS.grid} strokeWidth={1} />
      ))}
      <path d={pathFor('ctl')} fill="none" stroke={COLORS.blue} strokeWidth={2.2} />
      <path d={pathFor('atl')} fill="none" stroke={COLORS.accent} strokeWidth={2.2} />
      <text x={P.left - 6} y={P.top + 4} textAnchor="end" fill={COLORS.muted} fontSize="10" fontFamily="JetBrains Mono">{Math.round(max)}</text>
      <text x={P.left - 6} y={P.top + innerH + 4} textAnchor="end" fill={COLORS.muted} fontSize="10" fontFamily="JetBrains Mono">{Math.round(min)}</text>
      {[0, Math.floor(data.length / 2), data.length - 1].map(i => (
        <text key={i} x={xAt(i)} y={H - 6} textAnchor={i === 0 ? 'start' : i === data.length - 1 ? 'end' : 'middle'} fill={COLORS.muted} fontSize="10" fontFamily="JetBrains Mono">
          {fmtDay(data[i].day)}
        </text>
      ))}
    </svg>
  );
}

function Empty() {
  return <div style={{padding: '40px 12px', textAlign: 'center', color: 'var(--muted)', fontSize: 13}}>No data in this range yet.</div>;
}

window.ZH = window.ZH || {};
window.ZH.charts = { BarChart, LineChart, TrainingLoadChart, COLORS };


// ===== src/data.jsx =====
// Supabase client + data hooks for Zepp Health.

const SUPABASE_URL = 'https://fhfempisopwsdkmvywbt.supabase.co';
const SUPABASE_KEY = 'sb_publishable_MDxQPm0SzLHFTnDqg-eyyQ_0yposnES';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
});

const listeners = new Set();
let state = { wellness: [], activities: [], lastSync: null, session: null, loading: true };

function emit() { listeners.forEach(fn => fn()); }
function useStore() {
  const [, force] = React.useReducer(x => x + 1, 0);
  React.useEffect(() => {
    const fn = () => force();
    listeners.add(fn);
    return () => listeners.delete(fn);
  }, []);
  return state;
}

function initAuth() {
  console.log('[ZH] initAuth start');

  // Don't block on getSession (it hangs intermittently in Supabase JS).
  // Just register the listener — it fires INITIAL_SESSION once the lib initializes,
  // and again on any subsequent sign-in / sign-out.
  let resolvedOnce = false;
  sb.auth.onAuthStateChange(async (event, session) => {
    console.log('[ZH] auth event:', event, session ? session.user.email : 'none');
    state.session = session;
    state.loading = false;
    resolvedOnce = true;
    if (session) {
      try { await pullAll(); } catch (e) { console.error('[ZH] pull failed:', e); }
    } else {
      state.wellness = []; state.activities = [];
    }
    emit();
  });

  // Fallback: if for some reason the listener never fires, stop loading after 10s
  // so the sign-in screen appears instead of hanging forever.
  setTimeout(() => {
    if (!resolvedOnce && state.loading) {
      console.warn('[ZH] auth listener never fired, falling through to sign-in');
      state.loading = false;
      emit();
    }
  }, 10000);
}

async function signIn(email) {
  const redirectTo = window.location.origin + window.location.pathname;
  const { error } = await sb.auth.signInWithOtp({ email, options: { emailRedirectTo: redirectTo } });
  if (error) throw error;
}
async function signInWithPassword(email, password) {
  console.log('[ZH] signInWithPassword start');
  const result = await Promise.race([
    sb.auth.signInWithPassword({ email, password }),
    new Promise((_, rej) => setTimeout(() => rej(new Error('signIn timed out after 10s')), 10000))
  ]);
  console.log('[ZH] signInWithPassword result:', result);
  if (result.error) throw result.error;
}
async function signOut() { await sb.auth.signOut(); }

async function pullAll() {
  console.log('[ZH] pullAll start');
  const timer = setTimeout(() => console.warn('[ZH] pullAll: still waiting after 8s'), 8000);
  try {
    const oldest = new Date(); oldest.setDate(oldest.getDate() - 365);
    const oldestISO = oldest.toISOString().slice(0, 10);

    const [w, a, log] = await Promise.all([
      sb.from('zepp_wellness').select('*').gte('day', oldestISO).order('day', { ascending: true }),
      sb.from('zepp_activities').select('*').gte('start_date', oldest.toISOString()).order('start_date', { ascending: false }),
      sb.from('zepp_sync_log').select('*').order('ran_at', { ascending: false }).limit(1)
    ]);
    if (w.error) console.error('[ZH] wellness error:', w.error);
    if (a.error) console.error('[ZH] activities error:', a.error);
    if (log.error) console.error('[ZH] log error:', log.error);
    console.log('[ZH] pulled', { wellness: (w.data||[]).length, activities: (a.data||[]).length });
    state.wellness = w.data || [];
    state.activities = a.data || [];
    state.lastSync = (log.data && log.data[0]) || null;
    emit();
  } catch (e) {
    console.error('Pull failed:', e);
  } finally {
    clearTimeout(timer);
  }
}

window.ZH = window.ZH || {};
window.ZH.db = { useStore, initAuth, signIn, signInWithPassword, signOut, pullAll, getSession: () => state.session };

// Charts and COLORS are exposed on window.ZH.charts (declared in charts.jsx above).
const COLORS_REF = () => window.ZH.charts.COLORS;
const Charts = {
  Bar: (p) => window.ZH.charts.BarChart(p),
  Line: (p) => window.ZH.charts.LineChart(p),
  Load: (p) => window.ZH.charts.TrainingLoadChart(p),
};

// Range options
const RANGES = [
  { key: '7', label: '7d', days: 7 },
  { key: '30', label: '30d', days: 30 },
  { key: '90', label: '90d', days: 90 },
  { key: '365', label: '1y', days: 365 },
];

function activityIcon(type) {
  const t = (type || '').toLowerCase();
  if (t.includes('run')) return '🏃';
  if (t.includes('ride') || t.includes('cycl') || t.includes('bike')) return '🚴';
  if (t.includes('swim')) return '🏊';
  if (t.includes('walk') || t.includes('hike')) return '🥾';
  if (t.includes('strength') || t.includes('weight')) return '🏋️';
  if (t.includes('yoga') || t.includes('stretch')) return '🧘';
  return '💪';
}

function fmtDuration(secs) {
  if (!secs) return '—';
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}
function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', weekday: 'short' });
}
function fmtKm(meters) {
  if (!meters) return null;
  return (meters / 1000).toFixed(2) + ' km';
}

// Take a range of wellness data, fill missing days with nulls.
function fillRange(rows, days, fields) {
  const byDay = new Map(rows.map(r => [r.day, r]));
  const out = [];
  const today = new Date(); today.setHours(0, 0, 0, 0);
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    const day = d.toISOString().slice(0, 10);
    const r = byDay.get(day);
    const item = { day };
    fields.forEach(f => item[f] = r ? r[f] : null);
    out.push(item);
  }
  return out;
}

function App() {
  const s = window.ZH.db.useStore();
  const [rangeKey, setRangeKey] = React.useState('30');
  const range = RANGES.find(r => r.key === rangeKey) || RANGES[1];

  if (s.loading) return <div className="signin-wrap"><div className="text-muted">Loading… {s.error && <div style={{color: 'var(--accent)', marginTop: 12, fontSize: 12, fontFamily: 'monospace', maxWidth: 600}}>{s.error}</div>}</div></div>;
  if (s.error) return <div className="signin-wrap"><div className="card" style={{maxWidth: 500}}><h3 style={{margin: 0}}>Error</h3><pre style={{fontSize: 12, whiteSpace: 'pre-wrap', color: 'var(--accent)'}}>{s.error}</pre></div></div>;
  if (!s.session) return <SignIn />;

  // Slice data to the selected range
  const days = range.days;
  const stepsData = fillRange(s.wellness, days, ['steps']).map(r => ({ day: r.day, value: r.steps }));
  const sleepData = fillRange(s.wellness, days, ['sleep_secs']).map(r => ({ day: r.day, value: r.sleep_secs ? r.sleep_secs / 3600 : null }));
  const rhrData = fillRange(s.wellness, days, ['resting_hr']).map(r => ({ day: r.day, value: r.resting_hr }));
  const weightData = fillRange(s.wellness, days, ['weight']).map(r => ({ day: r.day, value: r.weight }));
  const loadData = fillRange(s.wellness, days, ['ctl', 'atl']);

  // Stats: latest values + 7-day comparison
  const recent = s.wellness.slice(-7);
  const prev = s.wellness.slice(-14, -7);
  function avg(rows, field) {
    const vals = rows.map(r => r[field]).filter(v => v != null);
    return vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : null;
  }
  const avgSteps = avg(recent, 'steps'), prevSteps = avg(prev, 'steps');
  const avgSleep = avg(recent, 'sleep_secs'), prevSleep = avg(prev, 'sleep_secs');
  const avgRhr = avg(recent, 'resting_hr'), prevRhr = avg(prev, 'resting_hr');
  const latestWeight = s.wellness.map(r => r.weight).filter(v => v != null).slice(-1)[0];
  const latestCtl = s.wellness.map(r => r.ctl).filter(v => v != null).slice(-1)[0];
  const latestAtl = s.wellness.map(r => r.atl).filter(v => v != null).slice(-1)[0];

  // Workouts in range
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - days);
  const workouts = s.activities.filter(a => new Date(a.start_date) >= cutoff);

  return (
    <div className="wrap">
      <header>
        <div className="brand">
          <div className="brand-mark">♥</div>
          <div>
            <h1>Zepp Health</h1>
            <div className="sub">Your watch data, your dashboard.</div>
          </div>
        </div>
        <div className="row-h gap-12">
          <div className="range-tabs">
            {RANGES.map(r => (
              <button key={r.key} className={rangeKey === r.key ? 'active' : ''} onClick={() => setRangeKey(r.key)}>{r.label}</button>
            ))}
          </div>
          <button className="btn btn-sm btn-ghost" onClick={() => window.ZH.db.pullAll()}>↻</button>
          <button className="btn btn-sm btn-ghost" title="Sign out" onClick={async () => { if (confirm('Sign out?')) await window.ZH.db.signOut(); }}>👤</button>
        </div>
      </header>

      {s.wellness.length === 0 && s.activities.length === 0 ? (
        <div className="card empty">
          <p>No data yet.</p>
          <p className="text-sm">Trigger the sync workflow on GitHub Actions, or wait for the next scheduled run.</p>
        </div>
      ) : (
        <>
          <div className="stats">
            <Stat label="Steps (7d avg)" value={avgSteps ? Math.round(avgSteps).toLocaleString() : '—'} prev={prevSteps} cur={avgSteps} better="up" />
            <Stat label="Sleep (7d avg)" value={avgSleep ? (avgSleep / 3600).toFixed(1) : '—'} unit="h" prev={prevSleep} cur={avgSleep} better="up" />
            <Stat label="Resting HR (7d)" value={avgRhr ? Math.round(avgRhr) : '—'} unit="bpm" prev={prevRhr} cur={avgRhr} better="down" />
            <Stat label="Weight" value={latestWeight ? latestWeight.toFixed(1) : '—'} unit="kg" />
            <Stat label="Fitness (CTL)" value={latestCtl ? latestCtl.toFixed(1) : '—'} />
            <Stat label="Fatigue (ATL)" value={latestAtl ? latestAtl.toFixed(1) : '—'} />
          </div>

          <div className="grid-2">
            <div className="card">
              <div className="card-head">
                <h2 className="card-title">Daily steps</h2>
                <span className="card-sub">{range.label}</span>
              </div>
              <Charts.Bar data={stepsData} color={window.ZH.charts.COLORS.green} formatValue={v => v >= 1000 ? (v / 1000).toFixed(0) + 'k' : v.toFixed(0)} />
            </div>

            <div className="card">
              <div className="card-head">
                <h2 className="card-title">Sleep duration</h2>
                <span className="card-sub">hours</span>
              </div>
              <Charts.Bar data={sleepData} color={window.ZH.charts.COLORS.purple} formatValue={v => v.toFixed(1)} />
            </div>

            <div className="card">
              <div className="card-head">
                <h2 className="card-title">Resting heart rate</h2>
                <span className="card-sub">bpm · 7d rolling avg</span>
              </div>
              <Charts.Line data={rhrData} color={window.ZH.charts.COLORS.accent} formatValue={v => Math.round(v)} />
            </div>

            <div className="card">
              <div className="card-head">
                <h2 className="card-title">Weight</h2>
                <span className="card-sub">kg</span>
              </div>
              <Charts.Line data={weightData} color={window.ZH.charts.COLORS.yellow} formatValue={v => v.toFixed(1)} />
            </div>
          </div>

          <div className="card" style={{marginTop: 14}}>
            <div className="card-head">
              <h2 className="card-title">Training load</h2>
              <div className="row-h text-sm">
                <span style={{color: window.ZH.charts.COLORS.blue}}>● CTL (fitness)</span>
                <span style={{color: window.ZH.charts.COLORS.accent}}>● ATL (fatigue)</span>
              </div>
            </div>
            <Charts.Load data={loadData} />
          </div>

          <div className="card" style={{marginTop: 14}}>
            <div className="card-head">
              <h2 className="card-title">Workouts</h2>
              <span className="card-sub">{workouts.length} in {range.label}</span>
            </div>
            {workouts.length === 0 ? (
              <div className="empty text-sm">No workouts in this range.</div>
            ) : workouts.map(w => (
              <div className="workout" key={w.id}>
                <div className="workout-icon">{activityIcon(w.type)}</div>
                <div className="workout-body">
                  <div className="workout-title">{w.name || w.type || 'Workout'}</div>
                  <div className="workout-meta">
                    <span>{fmtDate(w.start_date_local || w.start_date)}</span>
                    <span>{fmtDuration(w.moving_time || w.elapsed_time)}</span>
                    {fmtKm(w.distance) && <span>{fmtKm(w.distance)}</span>}
                    {w.average_heartrate && <span>{Math.round(w.average_heartrate)} bpm avg</span>}
                    {w.max_heartrate && <span>{w.max_heartrate} max</span>}
                  </div>
                </div>
                <div className="workout-right">
                  {w.calories ? <div>{Math.round(w.calories)} kcal</div> : null}
                  {w.icu_training_load ? <div>load {Math.round(w.icu_training_load)}</div> : null}
                </div>
              </div>
            ))}
          </div>
        </>
      )}

      <div style={{marginTop: 32, textAlign: 'center', color: 'var(--muted-2)', fontSize: 11, fontFamily: 'JetBrains Mono'}}>
        {s.lastSync ? (
          <>last sync: {new Date(s.lastSync.ran_at).toLocaleString('en-GB')} {s.lastSync.ok ? '✓' : '⚠ failed'}</>
        ) : 'never synced'}
      </div>
    </div>
  );
}

function Stat({ label, value, unit, prev, cur, better }) {
  let deltaClass = '';
  let deltaText = '';
  if (cur != null && prev != null && prev > 0) {
    const pct = ((cur - prev) / prev) * 100;
    const sign = pct >= 0 ? '+' : '';
    deltaText = `${sign}${pct.toFixed(0)}% vs prev 7d`;
    if (better === 'up') deltaClass = pct >= 0 ? 'up' : 'down';
    else if (better === 'down') deltaClass = pct <= 0 ? 'up' : 'down';
  }
  return (
    <div className="stat">
      <div className="label">{label}</div>
      <div className="value">{value}{unit && <span className="unit">{unit}</span>}</div>
      {deltaText && <div className={'delta ' + deltaClass}>{deltaText}</div>}
    </div>
  );
}

function SignIn() {
  const [mode, setMode] = React.useState('password'); // 'password' | 'magic'
  const [email, setEmail] = React.useState('mihael.florian@gmail.com');
  const [password, setPassword] = React.useState('');
  const [sent, setSent] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [busy, setBusy] = React.useState(false);

  async function submit(e) {
    e.preventDefault();
    setError(null); setBusy(true);
    try {
      if (mode === 'password') {
        await window.ZH.db.signInWithPassword(email.trim(), password);
      } else {
        await window.ZH.db.signIn(email.trim());
        setSent(true);
      }
    } catch (e) { setError(e.message || 'Sign in failed'); }
    finally { setBusy(false); }
  }

  return (
    <div className="signin-wrap">
      <div className="card signin-card">
        <div className="row-h" style={{marginBottom: 20}}>
          <div className="brand-mark">♥</div>
          <div style={{fontWeight: 700}}>Zepp Health</div>
        </div>
        {sent ? (
          <>
            <h3 style={{margin: '0 0 8px'}}>Check your email</h3>
            <p className="text-muted text-sm">Magic link sent to <b>{email}</b>.</p>
          </>
        ) : (
          <form onSubmit={submit}>
            <h3 style={{margin: '0 0 16px'}}>Sign in</h3>
            <div className="field">
              <label>Email</label>
              <input className="input" type="email" required value={email} onChange={e => setEmail(e.target.value)} />
            </div>
            {mode === 'password' && (
              <div className="field">
                <label>Password</label>
                <input className="input" type="password" required value={password} onChange={e => setPassword(e.target.value)} autoFocus />
              </div>
            )}
            {error && <div className="text-sm" style={{color: 'var(--accent)', marginBottom: 12}}>{error}</div>}
            <button className="btn btn-primary btn-block" type="submit" disabled={busy}>
              {busy ? '…' : (mode === 'password' ? 'Sign in' : 'Send magic link')}
            </button>
            <div style={{textAlign: 'center', marginTop: 12}}>
              <button type="button" className="btn-ghost btn btn-sm" onClick={() => { setMode(mode === 'password' ? 'magic' : 'password'); setError(null); }}>
                {mode === 'password' ? 'Use magic link instead' : 'Use password instead'}
              </button>
            </div>
          </form>
        )}
      </div>
    </div>
  );
}

if (typeof setBoot === 'function') setBoot('inline script running');
if (!window.supabase) { showFatal && showFatal('Supabase CDN failed to load (window.supabase is undefined)'); throw new Error('Supabase CDN failed to load'); }
if (!window.React) { showFatal && showFatal('React CDN failed to load'); throw new Error('React CDN failed to load'); }
if (!window.ReactDOM) { showFatal && showFatal('ReactDOM CDN failed to load'); throw new Error('ReactDOM CDN failed to load'); }
if (typeof setBoot === 'function') setBoot('mounting React');
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
if (typeof setBoot === 'function') setBoot('React mounted, calling initAuth');
window.ZH.db.initAuth();


</script>
</body>
