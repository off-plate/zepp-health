<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#0a0810" />
<title>Zepp Health</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%23FF5C6C'/%3E%3Cpath d='M50 80 C 20 60, 14 38, 28 26 C 38 18, 46 26, 50 32 C 54 26, 62 18, 72 26 C 86 38, 80 60, 50 80 Z' fill='%230a0810'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,0,0&display=block" />
<style>
/* ============ ZEPP HEALTH — DESIGN TOKENS ============ */
:root {
  /* Surface — warm dark gradient base */
  --bg-0: #0a0810;
  --bg-1: #14101a;
  --bg-2: #1c1622;

  /* Glass */
  --glass: rgba(255, 255, 255, 0.035);
  --glass-strong: rgba(255, 255, 255, 0.06);
  --glass-bright: rgba(255, 255, 255, 0.09);
  --hairline: rgba(255, 255, 255, 0.08);
  --hairline-bright: rgba(255, 255, 255, 0.14);

  /* Text */
  --text-1: rgba(255, 255, 255, 0.98);
  --text-2: rgba(255, 255, 255, 0.66);
  --text-3: rgba(255, 255, 255, 0.42);
  --text-4: rgba(255, 255, 255, 0.24);

  /* Domain accents */
  --cardio: #FF5C6C;
  --cardio-soft: #FF8B7A;
  --cardio-glow: rgba(255, 92, 108, 0.45);

  --sleep: #8E7BFF;
  --sleep-soft: #B29FFF;
  --sleep-glow: rgba(142, 123, 255, 0.45);

  --steps: #4DE0A0;
  --steps-soft: #7DEDBC;
  --steps-glow: rgba(77, 224, 160, 0.45);

  --train: #FFB547;
  --train-soft: #FFCD7A;
  --train-glow: rgba(255, 181, 71, 0.45);

  --recovery: #4ECDC4;
  --recovery-soft: #7DDDD6;
  --recovery-glow: rgba(78, 205, 196, 0.45);

  /* Shadows */
  --shadow-lift: 0 30px 80px -30px rgba(0, 0, 0, 0.7), 0 4px 12px -4px rgba(0, 0, 0, 0.4);
  --shadow-card: 0 2px 6px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.04);

  /* Type */
  --font: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  --font-display: 'Inter', system-ui, sans-serif;

  /* Spring easings — Apple style */
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-soft: cubic-bezier(0.22, 1, 0.36, 1);
  --ease-out-exp: cubic-bezier(0.16, 1, 0.3, 1);
}

* { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

html, body, #root {
  margin: 0;
  padding: 0;
  height: 100%;
  background: var(--bg-0);
  color: var(--text-1);
  font-family: var(--font);
  font-feature-settings: "ss01", "cv11", "tnum";
  overflow-x: hidden;
}

/* ============ ICONS ============ */
.icon {
  font-family: 'Material Symbols Rounded';
  font-weight: normal;
  font-style: normal;
  font-size: 18px;
  line-height: 1;
  display: inline-block;
  vertical-align: middle;
  text-transform: none;
  white-space: nowrap;
  word-wrap: normal;
  font-feature-settings: 'liga';
  -webkit-font-smoothing: antialiased;
  font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24;
}
.icon.fill { font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 24; }
.icon.sm { font-size: 14px; }
.icon.lg { font-size: 22px; }
.icon.xl { font-size: 32px; }

/* ============ CHART TOOLTIPS ============ */
.chart-wrap { position: relative; }
.chart-tooltip {
  position: absolute;
  pointer-events: none;
  z-index: 10;
  background: rgba(20, 16, 26, 0.92);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid var(--hairline-bright);
  border-radius: 10px;
  padding: 10px 12px;
  font-size: 12px;
  box-shadow: 0 12px 30px -8px rgba(0,0,0,0.6);
  min-width: 100px;
  transform: translate(-50%, calc(-100% - 12px));
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.15s ease, transform 0.25s var(--ease-soft);
}
.chart-tooltip.visible { opacity: 1; }
.chart-tooltip::after {
  content: '';
  position: absolute;
  bottom: -5px; left: 50%;
  transform: translateX(-50%) rotate(45deg);
  width: 8px; height: 8px;
  background: rgba(20, 16, 26, 0.92);
  border-right: 1px solid var(--hairline-bright);
  border-bottom: 1px solid var(--hairline-bright);
}
.chart-tooltip-label {
  font-size: 10px;
  color: var(--text-3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 600;
  margin-bottom: 4px;
}
.chart-tooltip-value {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text-1);
  font-variant-numeric: tabular-nums;
  display: flex;
  align-items: baseline;
  gap: 4px;
}
.chart-tooltip-value-unit {
  font-size: 11px;
  color: var(--text-3);
  font-weight: 500;
}
.chart-tooltip-sub {
  margin-top: 4px;
  font-size: 11px;
  color: var(--text-2);
}
.chart-tooltip-row {
  display: flex; justify-content: space-between; gap: 14px;
  font-size: 11px;
}
.chart-tooltip-row + .chart-tooltip-row { margin-top: 3px; }
.chart-tooltip-row strong { color: var(--text-1); font-weight: 600; font-variant-numeric: tabular-nums; }

.chart-hover-rect { fill: transparent; cursor: crosshair; }
.chart-crosshair { stroke: rgba(255,255,255,0.2); stroke-width: 1; stroke-dasharray: 3 3; pointer-events: none; }
.chart-hover-dot { pointer-events: none; }

/* ============ UPCOMING ACHIEVEMENT CARD ============ */
.upnext-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px;
  border-radius: 16px;
  background: linear-gradient(135deg, var(--glass) 0%, transparent 100%);
  border: 1px solid var(--hairline);
  transition: all 0.35s var(--ease-spring);
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.upnext-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at top right, var(--accent-fade, transparent), transparent 60%);
  pointer-events: none;
  opacity: 0.6;
}
.upnext-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px -8px var(--accent);
}
.upnext-badge {
  width: 52px; height: 52px;
  flex-shrink: 0;
}
.upnext-info { flex: 1; min-width: 0; position: relative; z-index: 1; }
.upnext-name { font-size: 13px; font-weight: 600; letter-spacing: -0.005em; }
.upnext-progress-bar {
  height: 4px;
  background: var(--hairline);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 6px;
}
.upnext-progress-fill {
  height: 100%;
  border-radius: 2px;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
}
.upnext-progress-text {
  font-size: 11px;
  color: var(--text-2);
  margin-top: 4px;
  font-variant-numeric: tabular-nums;
}
.upnext-pct {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.03em;
  color: var(--accent);
  font-variant-numeric: tabular-nums;
}

/* hypnogram & bedtime hover */
.hypno-bar { cursor: pointer; transition: filter 0.2s; }
.hypno-bar:hover { filter: brightness(1.4) drop-shadow(0 0 10px currentColor); }
.bedtime-pt { cursor: pointer; transition: r 0.2s; }

/* ============ ANIMATED BACKGROUND ============ */
.bg-stage {
  position: fixed;
  inset: 0;
  z-index: -1;
  overflow: hidden;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(142, 123, 255, 0.18), transparent 50%),
    radial-gradient(ellipse at 100% 100%, rgba(255, 92, 108, 0.14), transparent 55%),
    radial-gradient(ellipse at 50% 50%, rgba(78, 205, 196, 0.06), transparent 60%),
    linear-gradient(160deg, #15101e 0%, #0a0810 50%, #0c0a12 100%);
}
.bg-stage::before {
  content: '';
  position: absolute;
  inset: -20%;
  background:
    radial-gradient(circle at 30% 40%, rgba(255, 181, 71, 0.12), transparent 35%),
    radial-gradient(circle at 70% 60%, rgba(142, 123, 255, 0.16), transparent 40%);
  filter: blur(60px);
  animation: drift 28s ease-in-out infinite alternate;
}
.bg-stage::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.4), transparent),
    radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,0.3), transparent),
    radial-gradient(1px 1px at 80% 20%, rgba(255,255,255,0.25), transparent),
    radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,0.35), transparent),
    radial-gradient(1px 1px at 10% 60%, rgba(255,255,255,0.2), transparent),
    radial-gradient(1px 1px at 90% 50%, rgba(255,255,255,0.3), transparent);
  background-size: 600px 600px;
  opacity: 0.5;
  animation: twinkle 6s ease-in-out infinite alternate;
}
@keyframes drift {
  0%   { transform: translate3d(-2%, -1%, 0) rotate(0deg); }
  100% { transform: translate3d(3%, 2%, 0) rotate(8deg); }
}
@keyframes twinkle {
  0%, 100% { opacity: 0.35; }
  50% { opacity: 0.6; }
}

/* ============ APP SHELL ============ */
.app {
  min-height: 100vh;
  width: 100%;
  display: flex;
  flex-direction: column;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 22px 32px;
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  background: linear-gradient(180deg, rgba(10,8,16,0.85), rgba(10,8,16,0.4));
  border-bottom: 1px solid var(--hairline);
}
.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  font-weight: 600;
  letter-spacing: -0.02em;
  font-size: 16px;
}
.brand-mark {
  width: 28px; height: 28px;
  border-radius: 9px;
  background: conic-gradient(from 160deg, var(--cardio), var(--train), var(--steps), var(--recovery), var(--sleep), var(--cardio));
  position: relative;
  box-shadow: 0 4px 18px rgba(255, 92, 108, 0.3), inset 0 0 0 1px rgba(255,255,255,0.18);
}
.brand-mark::after {
  content: '';
  position: absolute;
  inset: 6px;
  background: var(--bg-0);
  border-radius: 5px;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
}
.brand-mark::before {
  content: '';
  position: absolute;
  inset: 9px;
  border-radius: 50%;
  background: #fff;
  z-index: 1;
  box-shadow: 0 0 12px rgba(255,255,255,0.8);
  animation: pulse 1.4s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.95; }
  50% { transform: scale(0.6); opacity: 0.5; }
}

.nav {
  display: flex;
  gap: 4px;
  background: var(--glass);
  border: 1px solid var(--hairline);
  border-radius: 14px;
  padding: 4px;
}
.nav-item {
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-2);
  background: transparent;
  border: 0;
  border-radius: 10px;
  cursor: pointer;
  transition: color 0.2s, background 0.2s, transform 0.4s var(--ease-spring);
  font-family: inherit;
  letter-spacing: -0.005em;
}
.nav-item:hover { color: var(--text-1); }
.nav-item.active {
  color: var(--text-1);
  background: var(--glass-bright);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 4px 12px rgba(0,0,0,0.4);
}

.user-chip {
  display: flex; align-items: center; gap: 10px;
  padding: 5px 5px 5px 14px;
  background: var(--glass);
  border: 1px solid var(--hairline);
  border-radius: 999px;
  font-size: 12px;
  color: var(--text-2);
}
.user-chip-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--steps);
  box-shadow: 0 0 10px var(--steps);
}
.user-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--sleep), var(--cardio));
  display: flex; align-items: center; justify-content: center;
  font-weight: 600; font-size: 12px; color: white;
}

/* ============ SCREEN CONTAINER ============ */
.screen {
  flex: 1;
  padding: 32px;
  max-width: 1440px;
  width: 100%;
  margin: 0 auto;
  animation: screen-in 0.6s var(--ease-soft) both;
}
@keyframes screen-in {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.screen-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 28px;
}
.screen-title {
  font-size: 42px;
  font-weight: 700;
  letter-spacing: -0.035em;
  margin: 0;
  line-height: 1;
}
.screen-greeting {
  font-size: 14px;
  color: var(--text-3);
  margin-bottom: 6px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  font-weight: 500;
}
.screen-date {
  font-size: 13px;
  color: var(--text-3);
  font-variant-numeric: tabular-nums;
}

/* ============ TILE / CARD ============ */
.tile {
  position: relative;
  background: var(--glass);
  border: 1px solid var(--hairline);
  border-radius: 24px;
  padding: 24px;
  backdrop-filter: blur(40px) saturate(160%);
  -webkit-backdrop-filter: blur(40px) saturate(160%);
  box-shadow: var(--shadow-card);
  overflow: hidden;
  transition: transform 0.5s var(--ease-spring), border-color 0.3s, box-shadow 0.5s;
  cursor: pointer;
  will-change: transform;
}
.tile:hover {
  border-color: var(--hairline-bright);
  box-shadow: var(--shadow-lift);
}
.tile::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  background: radial-gradient(circle at var(--mx, 50%) var(--my, 0%), rgba(255,255,255,0.06), transparent 50%);
  opacity: 0;
  transition: opacity 0.3s;
}
.tile:hover::before { opacity: 1; }

.tile-flat {
  cursor: default;
}
.tile-flat:hover {
  transform: none;
}

.tile-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 14px;
}
.tile-label-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent, var(--text-3));
  box-shadow: 0 0 8px var(--accent, transparent);
}
.tile-value {
  font-size: 56px;
  font-weight: 700;
  letter-spacing: -0.04em;
  line-height: 1;
  font-variant-numeric: tabular-nums;
  display: flex;
  align-items: baseline;
  gap: 6px;
}
.tile-unit {
  font-size: 16px;
  font-weight: 500;
  color: var(--text-3);
  letter-spacing: -0.01em;
}
.tile-sub {
  margin-top: 10px;
  font-size: 13px;
  color: var(--text-2);
  display: flex;
  align-items: center;
  gap: 8px;
}
.delta {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.delta.up { color: var(--steps); background: rgba(77,224,160,0.1); }
.delta.down { color: var(--cardio); background: rgba(255,92,108,0.1); }
.delta.flat { color: var(--text-3); background: rgba(255,255,255,0.04); }

/* ============ TODAY LAYOUT ============ */
.today-grid {
  display: grid;
  grid-template-columns: 1.6fr 1fr 1fr;
  grid-template-rows: auto auto auto;
  gap: 16px;
}
.today-hero { grid-column: 1 / 2; grid-row: 1 / 3; }
.today-rhr  { grid-column: 2 / 3; grid-row: 1 / 2; }
.today-readiness { grid-column: 3 / 4; grid-row: 1 / 2; }
.today-sleep { grid-column: 2 / 3; grid-row: 2 / 3; }
.today-form { grid-column: 3 / 4; grid-row: 2 / 3; }
.today-workout { grid-column: 1 / 3; grid-row: 3 / 4; }
.today-streaks { grid-column: 3 / 4; grid-row: 3 / 4; }
.today-upnext { grid-column: 1 / 4; grid-row: 4 / 5; }

@media (max-width: 1024px) {
  .today-grid { grid-template-columns: 1fr 1fr; }
  .today-hero { grid-column: 1 / 3; grid-row: 1; }
  .today-rhr, .today-readiness, .today-sleep, .today-form { grid-column: auto; grid-row: auto; }
  .today-workout { grid-column: 1 / 3; grid-row: auto; }
  .today-streaks { grid-column: 1 / 3; grid-row: auto; }
  .today-upnext { grid-column: 1 / 3; grid-row: auto; }
}
@media (max-width: 640px) {
  .today-grid { grid-template-columns: 1fr; }
  .today-hero, .today-rhr, .today-readiness, .today-sleep, .today-form,
  .today-workout, .today-streaks, .today-upnext { grid-column: 1; grid-row: auto; }
  .screen { padding: 18px; }
  .screen-title { font-size: 32px; }
  .topbar { padding: 14px 18px; }
  .nav { display: none; }
}

/* ============ HERO RINGS ============ */
.rings-hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
  padding: 12px 4px 4px;
}
.rings-stage {
  position: relative;
  width: 280px;
  height: 280px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.rings-legend {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
  width: 100%;
  padding-top: 18px;
  border-top: 1px solid var(--hairline);
}
@media (max-width: 720px) {
  .rings-legend { grid-template-columns: 1fr; gap: 14px; }
}
.rings-legend-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.rings-legend-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-2);
}
.rings-legend-swatch {
  width: 10px; height: 10px; border-radius: 3px;
  background: var(--accent);
  box-shadow: 0 0 10px var(--accent);
}
.rings-legend-value {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
  color: var(--text-1);
}
.rings-legend-goal {
  font-size: 11px;
  color: var(--text-3);
  font-variant-numeric: tabular-nums;
}

/* ============ SPARKLINE ============ */
.sparkline {
  width: 100%;
  height: 56px;
  margin-top: 14px;
  display: block;
}
.sparkline path.line {
  fill: none;
  stroke: var(--accent, var(--text-2));
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  filter: drop-shadow(0 0 6px var(--accent));
  stroke-dasharray: 1000;
  stroke-dashoffset: 1000;
  animation: draw-line 1.5s var(--ease-soft) 0.2s forwards;
}
.sparkline path.fill {
  fill: url(#sparkfill);
  opacity: 0;
  animation: fade-in 0.8s ease 1s forwards;
}
.sparkline .tip {
  fill: var(--accent);
  filter: drop-shadow(0 0 8px var(--accent));
  opacity: 0;
  animation: pop 0.5s var(--ease-spring) 1.6s forwards;
}
@keyframes draw-line {
  to { stroke-dashoffset: 0; }
}
@keyframes fade-in { to { opacity: 0.4; } }
@keyframes pop {
  from { opacity: 0; transform: scale(0); transform-origin: center; }
  to { opacity: 1; transform: scale(1); }
}

/* ============ HEARTBEAT ============ */
.heart-wrap {
  position: relative;
  width: 80px; height: 80px;
  display: flex; align-items: center; justify-content: center;
}
.heart-shape {
  width: 60px; height: 60px;
  position: relative;
  animation: heartbeat 1.05s ease-in-out infinite;
}
.heart-shape svg {
  width: 100%; height: 100%;
  filter: drop-shadow(0 0 14px var(--cardio-glow));
}
.heart-ring {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 2px solid var(--cardio);
  opacity: 0;
  animation: heart-ring 1.05s ease-out infinite;
}
@keyframes heartbeat {
  0%, 30%, 100% { transform: scale(1); }
  10% { transform: scale(1.14); }
  20% { transform: scale(0.96); }
}
@keyframes heart-ring {
  0% { transform: scale(0.8); opacity: 0.5; }
  100% { transform: scale(1.4); opacity: 0; }
}

/* ============ READINESS GAUGE ============ */
.gauge-stage { position: relative; width: 100%; aspect-ratio: 1.6 / 1; }
.gauge-value {
  position: absolute;
  inset: auto 0 18%;
  text-align: center;
  font-size: 48px;
  font-weight: 700;
  letter-spacing: -0.04em;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.gauge-value-sub {
  position: absolute;
  inset: auto 0 4%;
  text-align: center;
  font-size: 11px;
  color: var(--text-3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 600;
}

/* ============ STREAK ============ */
.streak-flame {
  width: 64px; height: 64px;
  display: flex; align-items: center; justify-content: center;
  font-size: 36px;
  border-radius: 18px;
  background: linear-gradient(135deg, rgba(255,92,108,0.18), rgba(255,181,71,0.14));
  border: 1px solid rgba(255,181,71,0.3);
  filter: drop-shadow(0 0 12px rgba(255,181,71,0.3));
}
.streak-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0;
  border-bottom: 1px solid var(--hairline);
}
.streak-row:last-child { border-bottom: 0; }
.streak-info {
  display: flex; flex-direction: column; gap: 2px;
}
.streak-name { font-size: 13px; font-weight: 500; color: var(--text-1); }
.streak-meta { font-size: 11px; color: var(--text-3); }
.streak-count {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
  background: linear-gradient(180deg, var(--train), var(--cardio));
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* ============ WORKOUT CARD ============ */
.workout-card {
  display: grid;
  grid-template-columns: 110px 1fr auto;
  gap: 20px;
  align-items: center;
  padding: 16px;
  border-radius: 18px;
  background: var(--glass);
  border: 1px solid var(--hairline);
  transition: all 0.4s var(--ease-spring);
  cursor: pointer;
}
.workout-card:hover {
  border-color: var(--hairline-bright);
  background: var(--glass-strong);
  transform: translateY(-2px);
}
.workout-thumb {
  width: 110px; height: 80px;
  border-radius: 12px;
  background: linear-gradient(135deg, rgba(255,92,108,0.12), rgba(142,123,255,0.08));
  position: relative;
  overflow: hidden;
  border: 1px solid var(--hairline);
}
.workout-thumb svg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
}
.workout-meta { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
.workout-type {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--accent, var(--text-3));
}
.workout-title { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
.workout-stats {
  display: flex; gap: 16px;
  font-size: 12px; color: var(--text-2);
  font-variant-numeric: tabular-nums;
}
.workout-stat strong { color: var(--text-1); font-weight: 600; }

.heatbar {
  display: flex;
  gap: 1px;
  height: 24px;
  border-radius: 4px;
  overflow: hidden;
  margin-top: 4px;
}
.heatbar-cell {
  flex: 1;
  background: var(--c, rgba(255,255,255,0.06));
}

/* ============ AWARDS ============ */
.awards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 18px;
}
.award-card {
  position: relative;
  aspect-ratio: 1;
  border-radius: 22px;
  background: var(--glass);
  border: 1px solid var(--hairline);
  padding: 16px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  cursor: pointer;
  transition: all 0.5s var(--ease-spring);
  overflow: hidden;
}
.award-card:hover {
  transform: translateY(-4px) scale(1.02);
  border-color: var(--hairline-bright);
}
.award-card.locked { opacity: 0.55; filter: grayscale(0.6); }
.award-card.locked:hover { opacity: 0.8; filter: grayscale(0.3); }
.award-badge {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.award-badge svg { width: 88px; height: 88px; }
.award-card:not(.locked) .award-badge svg {
  filter: drop-shadow(0 8px 24px var(--accent-glow, rgba(255,255,255,0.2)));
  animation: float 4s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}
.award-tier {
  position: absolute; top: 12px; right: 12px;
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.16em; text-transform: uppercase;
  padding: 3px 7px;
  border-radius: 999px;
  background: var(--glass-bright);
  border: 1px solid var(--hairline);
  color: var(--accent, var(--text-2));
}
.award-name {
  font-size: 13px; font-weight: 600;
  letter-spacing: -0.005em;
  text-align: center;
}
.award-progress {
  height: 3px;
  background: var(--hairline);
  border-radius: 2px;
  margin-top: 8px;
  overflow: hidden;
}
.award-progress-fill {
  height: 100%;
  background: var(--accent, var(--text-2));
  box-shadow: 0 0 8px var(--accent);
  border-radius: 2px;
  transition: width 0.8s var(--ease-soft);
}

/* ============ UNLOCK TAKEOVER ============ */
.unlock-overlay {
  position: fixed; inset: 0;
  z-index: 200;
  background: rgba(10,8,16,0.7);
  backdrop-filter: blur(28px);
  -webkit-backdrop-filter: blur(28px);
  display: flex; align-items: center; justify-content: center;
  animation: unlock-bg 0.5s ease both;
}
@keyframes unlock-bg { from { opacity: 0; } to { opacity: 1; } }
.unlock-card {
  text-align: center;
  padding: 40px;
  position: relative;
  z-index: 2;
}
.unlock-card svg.badge {
  width: 220px; height: 220px;
  animation: unlock-zoom 1.1s var(--ease-spring) both;
  filter: drop-shadow(0 16px 40px var(--accent-glow));
}
@keyframes unlock-zoom {
  0%   { transform: scale(0.2) rotate(-180deg); opacity: 0; }
  60%  { transform: scale(1.15) rotate(10deg); opacity: 1; }
  100% { transform: scale(1) rotate(0); opacity: 1; }
}
.unlock-title {
  font-size: 34px; font-weight: 700;
  letter-spacing: -0.03em;
  margin: 24px 0 8px;
  animation: rise 0.6s var(--ease-soft) 0.6s both;
}
.unlock-sub {
  font-size: 14px;
  color: var(--text-2);
  max-width: 360px;
  margin: 0 auto;
  animation: rise 0.6s var(--ease-soft) 0.75s both;
}
.unlock-tier {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 999px;
  background: var(--accent, var(--text-2));
  color: #0a0810;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.16em; text-transform: uppercase;
  margin-bottom: 16px;
  animation: rise 0.6s var(--ease-soft) 0.85s both;
}
.unlock-close {
  margin-top: 28px;
  padding: 12px 24px;
  background: var(--glass-bright);
  border: 1px solid var(--hairline-bright);
  border-radius: 999px;
  color: var(--text-1);
  font-size: 13px; font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  animation: rise 0.6s var(--ease-soft) 1s both;
  transition: transform 0.2s, background 0.2s;
}
.unlock-close:hover { background: var(--glass-bright); transform: scale(1.04); }
.unlock-close:active { transform: scale(0.96); }
@keyframes rise {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}
.unlock-particles {
  position: absolute; inset: 0;
  pointer-events: none;
}
.unlock-particle {
  position: absolute;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  animation: particle-burst 1.4s ease-out forwards;
}
@keyframes particle-burst {
  from {
    transform: translate(0, 0) scale(1);
    opacity: 1;
  }
  to {
    transform: translate(var(--dx), var(--dy)) scale(0);
    opacity: 0;
  }
}

/* ============ HR ZONES ============ */
.zone-row {
  display: grid;
  grid-template-columns: 60px 1fr 80px;
  align-items: center;
  gap: 14px;
  padding: 10px 0;
}
.zone-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; color: var(--text-2); }
.zone-bar {
  height: 8px;
  background: var(--hairline);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}
.zone-bar-fill {
  height: 100%;
  border-radius: 4px;
  background: var(--c);
  box-shadow: 0 0 8px var(--c);
  transform-origin: left;
  animation: zone-grow 1.2s var(--ease-spring) both;
}
@keyframes zone-grow {
  from { transform: scaleX(0); }
  to   { transform: scaleX(1); }
}
.zone-time {
  font-size: 12px;
  text-align: right;
  font-variant-numeric: tabular-nums;
  color: var(--text-2);
}

/* ============ CALENDAR HEATMAP ============ */
.heatmap-wrap { overflow-x: auto; padding-bottom: 8px; }
.heatmap {
  display: grid;
  grid-template-rows: repeat(7, 14px);
  grid-auto-flow: column;
  gap: 3px;
  width: max-content;
}
.heatmap-cell {
  width: 14px; height: 14px;
  border-radius: 3px;
  background: rgba(255,255,255,0.04);
  transition: transform 0.2s, background 0.2s;
  cursor: pointer;
}
.heatmap-cell:hover {
  transform: scale(1.4);
  outline: 1px solid var(--hairline-bright);
}
.heatmap-cell[data-level="1"] { background: rgba(77,224,160,0.20); }
.heatmap-cell[data-level="2"] { background: rgba(77,224,160,0.38); }
.heatmap-cell[data-level="3"] { background: rgba(77,224,160,0.60); }
.heatmap-cell[data-level="4"] { background: rgba(77,224,160,0.85); box-shadow: 0 0 4px rgba(77,224,160,0.4); }
.heatmap-cell[data-level="5"] { background: var(--steps); box-shadow: 0 0 8px var(--steps-glow); }

.heatmap-months {
  display: flex;
  gap: 0;
  font-size: 10px;
  color: var(--text-3);
  margin-bottom: 4px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.heatmap-month-label {
  flex: 1; min-width: 0;
}

/* ============ SLEEP STAGES CHART ============ */
.stages-stage { width: 100%; height: 160px; margin-top: 12px; }

/* ============ TRAINING LOAD ============ */
.pmc-stage { width: 100%; height: 280px; }

/* ============ TABS ============ */
.range-tabs {
  display: inline-flex;
  background: var(--glass);
  border: 1px solid var(--hairline);
  border-radius: 11px;
  padding: 3px;
  gap: 2px;
}
.range-tab {
  padding: 6px 12px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--text-3);
  background: transparent;
  border: 0;
  border-radius: 8px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.25s var(--ease-soft);
}
.range-tab.active {
  color: var(--text-1);
  background: var(--glass-bright);
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}

/* ============ MAP ============ */
.map-stage {
  position: relative;
  border-radius: 18px;
  overflow: hidden;
  aspect-ratio: 16 / 9;
  background: linear-gradient(135deg, #1a1525, #0d0a14);
  border: 1px solid var(--hairline);
}
.map-controls {
  position: absolute; top: 12px; right: 12px;
  display: flex; gap: 6px;
}
.map-btn {
  padding: 6px 10px;
  background: rgba(20,16,26,0.7);
  backdrop-filter: blur(14px);
  border: 1px solid var(--hairline-bright);
  border-radius: 8px;
  color: var(--text-1);
  font-size: 11px; font-weight: 600;
  font-family: inherit;
  cursor: pointer;
}

/* ============ PAGE LOAD STAGGER ============ */
.stagger > * {
  animation: stagger-rise 0.55s var(--ease-soft) both;
}
.stagger > *:nth-child(1) { animation-delay: 0.05s; }
.stagger > *:nth-child(2) { animation-delay: 0.11s; }
.stagger > *:nth-child(3) { animation-delay: 0.17s; }
.stagger > *:nth-child(4) { animation-delay: 0.23s; }
.stagger > *:nth-child(5) { animation-delay: 0.29s; }
.stagger > *:nth-child(6) { animation-delay: 0.35s; }
.stagger > *:nth-child(7) { animation-delay: 0.41s; }
.stagger > *:nth-child(8) { animation-delay: 0.47s; }
@keyframes stagger-rise {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ============ MISC ============ */
.row { display: flex; align-items: center; gap: 12px; }
.between { display: flex; align-items: center; justify-content: space-between; }
.col { display: flex; flex-direction: column; }
.muted { color: var(--text-3); }
.mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }

/* breathe animation for sleep card */
.breathe {
  animation: breathe 5.2s ease-in-out infinite;
}
@keyframes breathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.014); }
}

/* shimmer skeleton */
.shimmer {
  background: linear-gradient(90deg, var(--glass) 0%, var(--glass-bright) 50%, var(--glass) 100%);
  background-size: 200% 100%;
  animation: shimmer 1.6s ease-in-out infinite;
}
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* hide scrollbars but keep scrolling */
.scroller { overflow-y: auto; }
.scroller::-webkit-scrollbar { width: 6px; height: 6px; }
.scroller::-webkit-scrollbar-track { background: transparent; }
.scroller::-webkit-scrollbar-thumb { background: var(--hairline-bright); border-radius: 3px; }

/* table */
.tbl {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.tbl th {
  text-align: left;
  font-weight: 600;
  color: var(--text-3);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 10px 12px;
  border-bottom: 1px solid var(--hairline);
}
.tbl td {
  padding: 12px;
  border-bottom: 1px solid var(--hairline);
  font-variant-numeric: tabular-nums;
}
.tbl tr:hover td { background: var(--glass); }
.tbl tr:last-child td { border-bottom: 0; }

</style>
</head>

<script>
  function showFatal(msg) {
    const root = document.getElementById('root');
    if (root) root.innerHTML = '<div style="padding:24px;font-family:monospace;color:#FF5C6C;max-width:760px;margin:40px auto;white-space:pre-wrap;font-size:13px"><b>Error</b>\n\n' + String(msg) + '</div>';
  }
  window.addEventListener('error', (e) => { showFatal((e.message || e.error) + '\nat ' + (e.filename || '') + ':' + (e.lineno || '?')); });
  window.addEventListener('unhandledrejection', (e) => { showFatal('Promise rejection: ' + (e.reason && (e.reason.message || e.reason.stack) || e.reason)); });
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>

<script>
// ===== src/auth.jsx =====
// Auth + session storage for Zepp Health.
// Manual session management (the Supabase SDK was unreliable). All auth + data
// calls go via direct REST. Data fetching is in adapter.jsx.

const SUPABASE_URL = 'https://fhfempisopwsdkmvywbt.supabase.co';
const SUPABASE_KEY = 'sb_publishable_MDxQPm0SzLHFTnDqg-eyyQ_0yposnES';
const SESSION_KEY = 'zh-session-v1';
const listeners = new Set();
let state = {
  session: null,
  loading: true,
  error: null
};
function emit() {
  listeners.forEach(fn => fn());
}
function useStore() {
  const [, force] = React.useReducer(x => x + 1, 0);
  React.useEffect(() => {
    const fn = () => force();
    listeners.add(fn);
    return () => listeners.delete(fn);
  }, []);
  return state;
}
function loadStoredSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);
    return s.access_token && s.user ? s : null;
  } catch (e) {
    return null;
  }
}
function storeSession(s) {
  localStorage.setItem(SESSION_KEY, JSON.stringify(s));
}
function clearStoredSession() {
  localStorage.removeItem(SESSION_KEY);
}
function sessionFromTokenResponse(data) {
  return {
    access_token: data.access_token,
    refresh_token: data.refresh_token,
    expires_in: data.expires_in,
    expires_at: data.expires_at || Math.floor(Date.now() / 1000) + (data.expires_in || 3600),
    user: data.user
  };
}
function initAuth() {
  console.log('[ZH] initAuth');
  state.session = loadStoredSession();
  state.loading = false;
  emit();
}
async function signInWithPassword(email, password) {
  const res = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
    method: 'POST',
    headers: {
      apikey: SUPABASE_KEY,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      email,
      password
    })
  });
  const json = await res.json();
  if (!res.ok || !json.access_token) {
    throw new Error(json.error_description || json.error || json.msg || 'Sign in failed (' + res.status + ')');
  }
  state.session = sessionFromTokenResponse(json);
  storeSession(state.session);
  emit();
}
async function signIn(email) {
  const redirectTo = window.location.origin + window.location.pathname;
  const res = await fetch(SUPABASE_URL + '/auth/v1/otp', {
    method: 'POST',
    headers: {
      apikey: SUPABASE_KEY,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      email,
      options: {
        email_redirect_to: redirectTo
      }
    })
  });
  if (!res.ok) {
    const json = await res.json().catch(() => ({}));
    throw new Error(json.error_description || json.msg || 'Magic link failed (' + res.status + ')');
  }
}
async function signOut() {
  clearStoredSession();
  state.session = null;
  emit();
}
async function refreshSession() {
  if (!state.session || !state.session.refresh_token) return null;
  const res = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=refresh_token', {
    method: 'POST',
    headers: {
      apikey: SUPABASE_KEY,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      refresh_token: state.session.refresh_token
    })
  });
  if (!res.ok) return null;
  const data = await res.json();
  state.session = sessionFromTokenResponse(data);
  storeSession(state.session);
  emit();
  return state.session;
}
window.ZH = window.ZH || {};
window.ZH.db = {
  useStore,
  initAuth,
  signIn,
  signInWithPassword,
  signOut,
  refreshSession,
  getSession: () => state.session
};

// ===== src/adapter.jsx =====
// Real-data adapter: fetches from Supabase and exposes the globals the design expects:
//   wellness, todayW, workouts, lastNight, hrZones, streaks, awards, calendarData
//
// Where real data isn't available (HRV, readiness, sleep stages, GPS, time-in-zones),
// we synthesize reasonable values from related fields so the design degrades gracefully.

// SUPABASE_URL and SUPABASE_KEY are declared in auth.jsx, which is concatenated before this file.

const ACCENT_BY_TYPE = {
  run: 'var(--cardio)',
  running: 'var(--cardio)',
  ride: 'var(--train)',
  cycling: 'var(--train)',
  bike: 'var(--train)',
  swim: 'var(--recovery)',
  swimming: 'var(--recovery)',
  walk: 'var(--steps)',
  walking: 'var(--steps)',
  hike: 'var(--train)',
  strength: 'var(--sleep)',
  weight: 'var(--sleep)',
  weighttraining: 'var(--sleep)',
  yoga: 'var(--steps)',
  stretch: 'var(--steps)',
  workout: 'var(--cardio)',
  default: 'var(--cardio)'
};
function normalizeType(t) {
  if (!t) return 'workout';
  const s = t.toLowerCase().replace(/\s+/g, '');
  if (s.includes('run')) return 'run';
  if (s.includes('ride') || s.includes('bike') || s.includes('cycl')) return 'ride';
  if (s.includes('swim')) return 'swim';
  if (s.includes('walk')) return 'walk';
  if (s.includes('hike')) return 'hike';
  if (s.includes('strength') || s.includes('weight')) return 'strength';
  if (s.includes('yoga') || s.includes('stretch')) return 'yoga';
  return 'workout';
}
function mapWellness(rows) {
  return rows.map(r => ({
    date: new Date(r.day + 'T00:00:00'),
    steps: r.steps ?? null,
    sleepSeconds: r.sleep_secs ?? null,
    sleepScore: r.sleep_score ?? null,
    sleepQuality: r.sleep_quality ?? null,
    rhr: r.resting_hr ?? null,
    hrv: null,
    readiness: null,
    weight: r.weight ?? null,
    bodyFat: null,
    ctl: r.ctl ?? 0,
    atl: r.atl ?? 0,
    tsb: (r.ctl ?? 0) - (r.atl ?? 0),
    rampRate: r.ramp_rate ?? 0,
    spo2: null,
    stress: null,
    _raw: r.raw || null
  }));
}

// Fill missing days in [start, end] with null-valued rows so charts stay continuous.
function fillDaily(rows, days) {
  const byDay = new Map(rows.map(r => [r.date.toISOString().slice(0, 10), r]));
  const out = [];
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = d.toISOString().slice(0, 10);
