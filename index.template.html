<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#0e0e10" />
<title>Zepp Health</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%23e26d5c'/%3E%3Cpath d='M20 55 L35 55 L42 38 L55 72 L62 50 L72 55 L80 55' stroke='%230e0e10' stroke-width='6' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0e0e10;
    --panel: #16161a;
    --panel-2: #1d1d22;
    --border: #232328;
    --border-2: #2e2e35;
    --fg: #f3f3f0;
    --muted: #8a8a85;
    --muted-2: #6a6a65;
    --accent: #e26d5c;          /* warm coral / pulse */
    --accent-ink: #1a0e0c;
    --accent-soft: rgba(226, 109, 92, 0.12);
    --green: #6ec27a;
    --blue: #7aa8d8;
    --yellow: #e7c66b;
    --purple: #c08dd6;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  button, input, select { font: inherit; color: inherit; background: transparent; border: 0; }
  a { color: var(--accent); text-decoration: none; }

  .wrap { max-width: 1200px; margin: 0 auto; padding: 32px 28px 80px; }
  @media (max-width: 640px) { .wrap { padding: 20px 16px 60px; } }

  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-mark {
    width: 40px; height: 40px; border-radius: 10px;
    background: var(--accent); color: var(--accent-ink);
    display: grid; place-items: center; font-weight: 800;
  }
  h1 { font-size: clamp(24px, 4vw, 32px); font-weight: 700; letter-spacing: -0.02em; margin: 0; }
  .sub { color: var(--muted); margin: 2px 0 0; font-size: 13px; }
  .stamp { color: var(--muted-2); font-size: 12px; font-family: 'JetBrains Mono', monospace; }

  .range-tabs { display: inline-flex; gap: 4px; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 4px; }
  .range-tabs button {
    padding: 6px 12px; border-radius: 7px; color: var(--muted); font-weight: 500; font-size: 13px; cursor: pointer;
  }
  .range-tabs button.active { background: var(--panel-2); color: var(--fg); }

  /* Stats grid */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
  }
  .stat .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
  .stat .value { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; margin-top: 6px; line-height: 1.1; }
  .stat .unit { font-size: 13px; color: var(--muted); font-weight: 500; margin-left: 4px; }
  .stat .delta { font-size: 12px; margin-top: 4px; color: var(--muted); }
  .stat .delta.up { color: var(--green); }
  .stat .delta.down { color: var(--accent); }

  /* Card */
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
  }
  .card + .card { margin-top: 14px; }
  .card-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; gap: 10px; }
  .card-title { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; margin: 0; }
  .card-sub { color: var(--muted); font-size: 12px; }

  .grid-2 { display: grid; gap: 14px; grid-template-columns: 1fr 1fr; }
  @media (max-width: 820px) { .grid-2 { grid-template-columns: 1fr; } }

  /* Workouts list */
  .workout {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .workout:last-child { border-bottom: 0; }
  .workout-icon {
    width: 36px; height: 36px; border-radius: 9px;
    background: var(--panel-2); display: grid; place-items: center;
    font-size: 18px; flex-shrink: 0;
  }
  .workout-body { flex: 1; min-width: 0; }
  .workout-title { font-weight: 500; }
  .workout-meta { font-size: 12px; color: var(--muted); margin-top: 3px; display: flex; gap: 10px; flex-wrap: wrap; }
  .workout-right { text-align: right; color: var(--muted); font-size: 12px; }

  /* Sign-in screen */
  .signin-wrap { display: grid; place-items: center; min-height: 100vh; padding: 20px; }
  .signin-card { max-width: 380px; width: 100%; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
  .input { width: 100%; background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 14px; }
  .input:focus { outline: none; border-color: var(--accent); }
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; border-radius: 8px; background: var(--panel-2); border: 1px solid var(--border); font-weight: 500; font-size: 14px; cursor: pointer; }
  .btn-primary { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); font-weight: 600; }
  .btn-block { width: 100%; justify-content: center; }
  .btn-sm { padding: 6px 10px; font-size: 12px; }
  .btn-ghost { background: transparent; border-color: transparent; color: var(--muted); }
  .btn-ghost:hover { color: var(--fg); }

  .empty { text-align: center; padding: 48px 20px; color: var(--muted); }

  .text-muted { color: var(--muted); }
  .text-sm { font-size: 13px; }
  .row-h { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .gap-12 { gap: 12px; }
</style>
</head>
<body>
  <div id="root">
    <div style="display:grid;place-items:center;min-height:100vh;color:var(--muted)" id="boot-status">Booting scripts… <span id="boot-step" style="margin-left:8px;font-family:monospace;color:#e26d5c"></span></div>
  </div>
<script>
  function setBoot(s) {
    var el = document.getElementById('boot-step');
    if (el) el.textContent = s;
  }
  window.addEventListener('load', () => setBoot('window loaded, awaiting script transforms'));
</script>

<script>
  // Surface any fatal runtime error to the page so we don't get stuck on Loading…
  function showFatal(msg) {
    const root = document.getElementById('root');
    if (root) root.innerHTML = '<div style="padding:24px;font-family:monospace;color:#e26d5c;max-width:760px;margin:40px auto;white-space:pre-wrap;font-size:13px"><b>Error</b>\n\n' + String(msg) + '</div>';
  }
  window.addEventListener('error', (e) => {
    showFatal((e.message || e.error) + '\nat ' + (e.filename || '') + ':' + (e.lineno || '?'));
  });
  window.addEventListener('unhandledrejection', (e) => {
    showFatal('Promise rejection: ' + (e.reason && (e.reason.message || e.reason.stack) || e.reason));
  });
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

</script>
</body>
</html>
