<body>
<div id="root">
  <div style="display:grid;place-items:center;min-height:100vh;color:rgba(255,255,255,0.66);font-family:Inter,sans-serif;font-size:14px">Booting…</div>
</div>

<script>
  function showFatal(msg) {
    const root = document.getElementById('root');
    if (root) root.innerHTML = '<div style="padding:24px;font-family:monospace;color:#FF5C6C;max-width:760px;margin:40px auto;white-space:pre-wrap;font-size:13px"><b>Error</b>\n\n' + String(msg) + '</div>';
  }
  window.addEventListener('error', (e) => { showFatal((e.message || e.error) + '\nat ' + (e.filename || '') + ':' + (e.lineno || '?')); });
  window.addEventListener('unhandledrejection', (e) => { showFatal('Promise rejection: ' + (e.reason && (e.reason.message || e.reason.stack) || e.reason)); });
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
