name: Sync Zepp data

on:
  schedule:
    - cron: '0 5 * * *'   # 05:00 UTC daily (07:00 Prague summer / 06:00 winter)
  workflow_dispatch:
    inputs:
      lookback_days:
        description: 'Days of history to pull (default 60)'
        required: false
        default: '60'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: sync
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: node sync.mjs
        env:
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
          INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '60' }}
